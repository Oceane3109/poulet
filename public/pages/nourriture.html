<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKOHO — Nourriture</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="app-sidebar" id="partial-aside"></aside>
        <div class="app-main">
            <header class="app-header" id="partial-header"></header>
            <main class="app-content">

                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
                    <h1 style="font-size:22px;font-weight:700;">Nourriture</h1>
                    <button class="btn btn-primary" onclick="openModal()">
                        <i class="bi bi-plus-lg"></i> Nouvel aliment
                    </button>
                </div>

                <div class="table-card">
                    <div style="overflow-x:auto;">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Nom</th>
                                    <th>Type</th>
                                    <th class="text-end">Prix/gramme (Ar)</th>
                                    <th class="text-end">Prix/kg (Ar)</th>
                                    <th class="text-center">Fiches liées</th>
                                    <th style="width:100px;"></th>
                                </tr>
                            </thead>
                            <tbody id="nourr-tbody">
                                <tr><td colspan="6" class="text-center text-muted" style="padding:32px;">Chargement...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </main>
            <footer class="app-footer" id="partial-footer"></footer>
        </div>
    </div>

    <!-- Create/Edit modal -->
    <div id="modal-nourr" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;">
        <div style="max-width:440px;margin:100px auto;background:white;border-radius:var(--radius);box-shadow:var(--shadow-lg);">
            <div class="modal-header">
                <h5 class="modal-title" id="modal-title">Nouvel aliment</h5>
                <button class="btn-icon" onclick="closeModal()"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="modal-body">
                <div style="display:grid;gap:16px;">
                    <div>
                        <label class="form-label">Nom *</label>
                        <input type="text" class="form-control" id="nourr-nom" placeholder="ex: Granulés ponte A">
                    </div>
                    <div>
                        <label class="form-label">Type d'aliment</label>
                        <select class="form-select" id="nourr-type">
                            <option value="">— Choisir —</option>
                            <option value="Granulés">Granulés</option>
                            <option value="Mash">Mash</option>
                            <option value="Démarrage">Démarrage</option>
                            <option value="Croissance">Croissance</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Prix par gramme (Ar) *</label>
                        <input type="number" class="form-control" id="nourr-prix" min="0" step="0.0001" oninput="updatePrixKg()">
                    </div>
                    <div class="text-muted" style="font-size:13px;" id="prix-kg-preview">Prix au kg : —</div>
                </div>
            </div>
            <div class="modal-footer" style="display:flex;justify-content:flex-end;gap:8px;">
                <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
                <button class="btn btn-primary" id="modal-submit" onclick="submitNourr()">Créer</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/pages/nourriture.js"></script>
</body>
</html>
