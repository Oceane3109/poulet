<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKOHO — Production d'œufs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="app-sidebar" id="partial-aside"></aside>
        <div class="app-main">
            <header class="app-header" id="partial-header"></header>
            <main class="app-content">

                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
                    <h1 style="font-size:22px;font-weight:700;">Production d'œufs</h1>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="bi bi-plus-lg"></i> Nouvelle production
                    </button>
                </div>

                <!-- KPIs -->
                <div class="kpi-grid" id="kpi-container">
                    <div class="kpi-card kpi-primary">
                        <div class="kpi-icon"><i class="bi bi-egg"></i></div>
                        <div class="kpi-value" id="kpi-total">-</div>
                        <div class="kpi-label">Total produit</div>
                    </div>
                    <div class="kpi-card kpi-success">
                        <div class="kpi-icon"><i class="bi bi-cart-check"></i></div>
                        <div class="kpi-value" id="kpi-vendu">-</div>
                        <div class="kpi-label">Vendus</div>
                    </div>
                    <div class="kpi-card kpi-highlight">
                        <div class="kpi-icon"><i class="bi bi-box-seam"></i></div>
                        <div class="kpi-value" id="kpi-stock">-</div>
                        <div class="kpi-label">En stock</div>
                    </div>
                    <div class="kpi-card kpi-warning">
                        <div class="kpi-icon"><i class="bi bi-thermometer-half"></i></div>
                        <div class="kpi-value" id="kpi-couvaison">-</div>
                        <div class="kpi-label">En couvaison</div>
                    </div>
                </div>

                <!-- Sale rate -->
                <div class="card mb-20" style="padding:16px 20px;">
                    <div style="display:flex;align-items:center;gap:16px;">
                        <span style="font-size:14px;font-weight:600;white-space:nowrap;">Taux de vente</span>
                        <div class="progress" style="flex:1;">
                            <div class="progress-bar" id="sale-rate-bar" style="width:0%"></div>
                        </div>
                        <span class="text-muted" style="font-size:13px;white-space:nowrap;" id="sale-rate-text">0%</span>
                    </div>
                </div>

                <!-- Filters + table -->
                <div class="card mb-20" style="padding:16px 20px;">
                    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                        <select class="form-select" style="width:200px;" id="filter-lot" onchange="loadData()">
                            <option value="">Tous les lots</option>
                        </select>
                        <input type="date" class="form-control" style="width:160px;" id="filter-from" onchange="loadData()">
                        <span class="text-muted">→</span>
                        <input type="date" class="form-control" style="width:160px;" id="filter-to" onchange="loadData()">
                        <button class="btn btn-outline btn-sm" onclick="clearOeufsFilters()">Réinitialiser</button>
                    </div>
                </div>

                <div class="table-card">
                    <div style="overflow-x:auto;">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Lot</th>
                                    <th class="text-end">Nb œufs</th>
                                    <th style="width:60px;"></th>
                                </tr>
                            </thead>
                            <tbody id="oeufs-tbody">
                                <tr><td colspan="4" class="text-center text-muted" style="padding:32px;">Chargement...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </main>
            <footer class="app-footer" id="partial-footer"></footer>
        </div>
    </div>

    <!-- Add production modal -->
    <div id="modal-add" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;">
        <div style="max-width:440px;margin:100px auto;background:white;border-radius:var(--radius);box-shadow:var(--shadow-lg);">
            <div class="modal-header">
                <h5 class="modal-title">Nouvelle production</h5>
                <button class="btn-icon" onclick="closeAddModal()"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="modal-body">
                <div style="display:grid;gap:16px;">
                    <div>
                        <label class="form-label">Lot *</label>
                        <select class="form-select" id="add-lot"></select>
                    </div>
                    <div>
                        <label class="form-label">Date *</label>
                        <input type="date" class="form-control" id="add-date">
                    </div>
                    <div>
                        <label class="form-label">Nombre d'œufs *</label>
                        <input type="number" class="form-control" id="add-nb" min="1">
                    </div>
                </div>
            </div>
            <div class="modal-footer" style="display:flex;justify-content:flex-end;gap:8px;">
                <button class="btn btn-outline" onclick="closeAddModal()">Annuler</button>
                <button class="btn btn-primary" onclick="submitAdd()">Enregistrer</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/pages/oeufs.js"></script>
</body>
</html>
