<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKOHO — Ventes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="app-sidebar" id="partial-aside"></aside>
        <div class="app-main">
            <header class="app-header" id="partial-header"></header>
            <main class="app-content">

                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
                    <h1 style="font-size:22px;font-weight:700;">Ventes</h1>
                </div>

                <!-- Tabs -->
                <div class="tabs mb-20">
                    <button class="tab active" data-tab="oeufs" onclick="switchTab('oeufs')"><i class="bi bi-egg"></i> Œufs</button>
                    <button class="tab" data-tab="poulets" onclick="switchTab('poulets')"><i class="bi bi-feather"></i> Poulets</button>
                    <button class="tab" data-tab="lots" onclick="switchTab('lots')"><i class="bi bi-collection"></i> Cession de lot</button>
                </div>

                <!-- Shared filters -->
                <div class="card mb-20" style="padding:16px 20px;">
                    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                        <select class="form-select" style="width:200px;" id="filter-lot" onchange="applyVenteFilters()">
                            <option value="">Tous les lots</option>
                        </select>
                        <input type="date" class="form-control" style="width:160px;" id="filter-from" onchange="applyVenteFilters()">
                        <span class="text-muted">→</span>
                        <input type="date" class="form-control" style="width:160px;" id="filter-to" onchange="applyVenteFilters()">
                        <button class="btn btn-outline btn-sm" onclick="clearVenteFilters()">Réinitialiser</button>
                    </div>
                </div>

                <!-- Tab: Oeufs -->
                <div id="tab-oeufs">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                        <div class="text-muted" id="oeufs-total" style="font-size:14px;"></div>
                        <button class="btn btn-primary btn-sm" onclick="openVenteOeufModal()"><i class="bi bi-plus"></i> Vente d'œufs</button>
                    </div>
                    <div class="table-card">
                        <div style="overflow-x:auto;">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Lot</th>
                                        <th class="text-end">Nb œufs</th>
                                        <th class="text-end">Prix unit.</th>
                                        <th class="text-end">Total</th>
                                    </tr>
                                </thead>
                                <tbody id="oeufs-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Tab: Poulets -->
                <div id="tab-poulets" style="display:none;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                        <div class="text-muted" id="poulets-total" style="font-size:14px;"></div>
                        <button class="btn btn-primary btn-sm" onclick="openVentePouletModal()"><i class="bi bi-plus"></i> Vente de poulets</button>
                    </div>
                    <div class="table-card">
                        <div style="overflow-x:auto;">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Lot</th>
                                        <th class="text-end">Nb poulets</th>
                                        <th class="text-end">Poids (kg)</th>
                                        <th class="text-end">Prix/kg</th>
                                        <th class="text-end">Total</th>
                                    </tr>
                                </thead>
                                <tbody id="poulets-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Tab: Lots -->
                <div id="tab-lots" style="display:none;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                        <div class="text-muted" id="lots-total" style="font-size:14px;"></div>
                        <button class="btn btn-primary btn-sm" onclick="openVenteLotModal()"><i class="bi bi-plus"></i> Cession de lot</button>
                    </div>
                    <div class="table-card">
                        <div style="overflow-x:auto;">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Lot</th>
                                        <th class="text-end">Prix de vente</th>
                                    </tr>
                                </thead>
                                <tbody id="lots-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </main>
            <footer class="app-footer" id="partial-footer"></footer>
        </div>
    </div>

    <!-- Vente oeuf modal -->
    <div id="modal-vente-oeuf" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;">
        <div style="max-width:440px;margin:100px auto;background:white;border-radius:var(--radius);box-shadow:var(--shadow-lg);">
            <div class="modal-header">
                <h5 class="modal-title">Vente d'œufs</h5>
                <button class="btn-icon" onclick="closeVenteOeufModal()"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="modal-body">
                <div style="display:grid;gap:16px;">
                    <div>
                        <label class="form-label">Lot *</label>
                        <select class="form-select" id="vo-lot"></select>
                    </div>
                    <div>
                        <label class="form-label">Date *</label>
                        <input type="date" class="form-control" id="vo-date">
                    </div>
                    <div>
                        <label class="form-label">Nombre d'œufs *</label>
                        <input type="number" class="form-control" id="vo-nb" min="1" oninput="updateVOTotal()">
                    </div>
                    <div>
                        <label class="form-label">Prix unitaire (Ar) <span class="text-muted">— vide = prix race</span></label>
                        <input type="number" class="form-control" id="vo-prix" min="0" oninput="updateVOTotal()">
                    </div>
                    <div class="text-muted" style="font-size:13px;" id="vo-total">Total estimé : —</div>
                </div>
            </div>
            <div class="modal-footer" style="display:flex;justify-content:flex-end;gap:8px;">
                <button class="btn btn-outline" onclick="closeVenteOeufModal()">Annuler</button>
                <button class="btn btn-primary" onclick="submitVenteOeuf()">Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- Vente poulet modal -->
    <div id="modal-vente-poulet" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;">
        <div style="max-width:440px;margin:100px auto;background:white;border-radius:var(--radius);box-shadow:var(--shadow-lg);">
            <div class="modal-header">
                <h5 class="modal-title">Vente de poulets</h5>
                <button class="btn-icon" onclick="closeVentePouletModal()"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="modal-body">
                <div style="display:grid;gap:16px;">
                    <div>
                        <label class="form-label">Lot *</label>
                        <select class="form-select" id="vp-lot" onchange="updateVPEstimates()"></select>
                    </div>
                    <div>
                        <label class="form-label">Date *</label>
                        <input type="date" class="form-control" id="vp-date" onchange="updateVPEstimates()">
                    </div>
                    <div>
                        <label class="form-label">Nombre de poulets *</label>
                        <input type="number" class="form-control" id="vp-nb" min="1" oninput="updateVPPoids()">
                    </div>
                    <div>
                        <label class="form-label">Poids total (kg) * <span class="text-muted" id="vp-poids-hint"></span></label>
                        <input type="number" class="form-control" id="vp-poids" min="0.1" step="0.1" oninput="updateVPTotal()">
                    </div>
                    <div>
                        <label class="form-label">Prix/kg (Ar) <span class="text-muted">— vide = prix race</span></label>
                        <input type="number" class="form-control" id="vp-prix" min="0" oninput="updateVPTotal()">
                    </div>
                    <div class="text-muted" style="font-size:13px;" id="vp-total">Total estimé : —</div>
                </div>
            </div>
            <div class="modal-footer" style="display:flex;justify-content:flex-end;gap:8px;">
                <button class="btn btn-outline" onclick="closeVentePouletModal()">Annuler</button>
                <button class="btn btn-primary" onclick="submitVentePoulet()">Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- Vente lot modal -->
    <div id="modal-vente-lot" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;">
        <div style="max-width:440px;margin:100px auto;background:white;border-radius:var(--radius);box-shadow:var(--shadow-lg);">
            <div class="modal-header">
                <h5 class="modal-title">Cession de lot</h5>
                <button class="btn-icon" onclick="closeVenteLotModal()"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="modal-body">
                <div style="display:grid;gap:16px;">
                    <div>
                        <label class="form-label">Lot *</label>
                        <select class="form-select" id="vl-lot"></select>
                    </div>
                    <div>
                        <label class="form-label">Date *</label>
                        <input type="date" class="form-control" id="vl-date">
                    </div>
                    <div>
                        <label class="form-label">Prix de vente (Ar) *</label>
                        <input type="number" class="form-control" id="vl-prix" min="0">
                    </div>
                </div>
            </div>
            <div class="modal-footer" style="display:flex;justify-content:flex-end;gap:8px;">
                <button class="btn btn-outline" onclick="closeVenteLotModal()">Annuler</button>
                <button class="btn btn-primary" onclick="submitVenteLot()">Enregistrer</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/pages/ventes.js"></script>
</body>
</html>
