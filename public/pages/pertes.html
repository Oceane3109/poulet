<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKOHO — Pertes / Mortalité</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="app-sidebar" id="partial-aside"></aside>
        <div class="app-main">
            <header class="app-header" id="partial-header"></header>
            <main class="app-content">

                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
                    <h1 style="font-size:22px;font-weight:700;">Pertes / Mortalité</h1>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="bi bi-plus-lg"></i> Enregistrer une perte
                    </button>
                </div>

                <!-- KPIs -->
                <div class="kpi-grid">
                    <div class="kpi-card kpi-danger">
                        <div class="kpi-icon"><i class="bi bi-heartbreak"></i></div>
                        <div class="kpi-value" id="kpi-jour">-</div>
                        <div class="kpi-label">Pertes du jour</div>
                    </div>
                    <div class="kpi-card kpi-warning">
                        <div class="kpi-icon"><i class="bi bi-calendar-week"></i></div>
                        <div class="kpi-value" id="kpi-mois">-</div>
                        <div class="kpi-label">Pertes du mois</div>
                    </div>
                    <div class="kpi-card kpi-primary">
                        <div class="kpi-icon"><i class="bi bi-bar-chart"></i></div>
                        <div class="kpi-value" id="kpi-total">-</div>
                        <div class="kpi-label">Total cumulé</div>
                    </div>
                    <div class="kpi-card kpi-highlight">
                        <div class="kpi-icon"><i class="bi bi-exclamation-triangle"></i></div>
                        <div class="kpi-value" id="kpi-lot" style="font-size:16px;">-</div>
                        <div class="kpi-label">Lot le plus touché</div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="card mb-20" style="padding:16px 20px;">
                    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                        <select class="form-select" style="width:200px;" id="filter-lot" onchange="filterPertes()">
                            <option value="">Tous les lots</option>
                        </select>
                        <select class="form-select" style="width:200px;" id="filter-cause" onchange="filterPertes()">
                            <option value="">Toutes les causes</option>
                        </select>
                        <select class="form-select" style="width:160px;" id="filter-entite" onchange="filterPertes()">
                            <option value="">Toutes entités</option>
                            <option value="Poulet">Poulet</option>
                            <option value="Oeuf">Oeuf</option>
                        </select>
                        <input type="date" class="form-control" style="width:160px;" id="filter-from" onchange="filterPertes()">
                        <span class="text-muted">→</span>
                        <input type="date" class="form-control" style="width:160px;" id="filter-to" onchange="filterPertes()">
                        <button class="btn btn-outline btn-sm" onclick="clearPertesFilters()">Réinitialiser</button>
                    </div>
                </div>

                <div class="table-card">
                    <div style="overflow-x:auto;">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Lot</th>
                                    <th>Entité</th>
                                    <th class="text-end">Nombre</th>
                                    <th>Cause</th>
                                </tr>
                            </thead>
                            <tbody id="pertes-tbody">
                                <tr><td colspan="5" class="text-center text-muted" style="padding:32px;">Chargement...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </main>
            <footer class="app-footer" id="partial-footer"></footer>
        </div>
    </div>

    <!-- Add modal -->
    <div id="modal-add" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;">
        <div style="max-width:440px;margin:100px auto;background:white;border-radius:var(--radius);box-shadow:var(--shadow-lg);">
            <div class="modal-header">
                <h5 class="modal-title">Enregistrer une perte</h5>
                <button class="btn-icon" onclick="closeAddModal()"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="modal-body">
                <div style="display:grid;gap:16px;">
                    <div>
                        <label class="form-label">Lot *</label>
                        <select class="form-select" id="add-lot"></select>
                    </div>
                    <div>
                        <label class="form-label">Date *</label>
                        <input type="date" class="form-control" id="add-date">
                    </div>
                    <div>
                        <label class="form-label">Nombre de pertes *</label>
                        <input type="number" class="form-control" id="add-nb" min="1">
                    </div>
                    <div>
                        <label class="form-label">Entité *</label>
                        <select class="form-select" id="add-entite">
                            <option value="Poulet">Poulet</option>
                            <option value="Oeuf">Oeuf</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Cause</label>
                        <input type="text" class="form-control" id="add-cause" placeholder="Ex: maladie, prédateur... (optionnel)">
                    </div>
                </div>
            </div>
            <div class="modal-footer" style="display:flex;justify-content:flex-end;gap:8px;">
                <button class="btn btn-outline" onclick="closeAddModal()">Annuler</button>
                <button class="btn btn-primary" onclick="submitAdd()">Enregistrer</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/pages/pertes.js"></script>
</body>
</html>
