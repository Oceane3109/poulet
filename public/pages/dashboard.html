<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKOHO — Tableau de bord</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="app-sidebar" id="partial-aside"></aside>
        <div class="app-main">
            <header class="app-header" id="partial-header"></header>
            <main class="app-content">

                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
                    <div>
                        <h1 style="font-size:22px;font-weight:700;margin-bottom:4px;">Tableau de bord</h1>
                        <p class="text-muted" id="dash-subtitle">Vue d'ensemble de l'élevage</p>
                    </div>
                </div>

                <!-- KPIs -->
                <div class="kpi-grid" id="kpi-container">
                    <div class="kpi-card kpi-primary">
                        <div class="kpi-icon"><i class="bi bi-collection"></i></div>
                        <div class="kpi-value" id="kpi-lots">-</div>
                        <div class="kpi-label">Lots actifs</div>
                    </div>
                    <div class="kpi-card kpi-success">
                        <div class="kpi-icon"><i class="bi bi-egg"></i></div>
                        <div class="kpi-value" id="kpi-stock">-</div>
                        <div class="kpi-label">Stock œufs total</div>
                    </div>
                    <div class="kpi-card kpi-warning">
                        <div class="kpi-icon"><i class="bi bi-feather"></i></div>
                        <div class="kpi-value" id="kpi-poules">-</div>
                        <div class="kpi-label">Poules vivantes</div>
                    </div>
                    <div class="kpi-card kpi-highlight">
                        <div class="kpi-icon"><i class="bi bi-cash-stack"></i></div>
                        <div class="kpi-value" id="kpi-ca">-</div>
                        <div class="kpi-label">CA du jour</div>
                    </div>
                </div>

                <!-- Charts row -->
                <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:24px;">
                    <div class="card">
                        <div class="card-header">
                            <span>Production d'œufs</span>
                            <div style="display:flex;gap:4px;">
                                <button class="btn btn-sm btn-outline chart-period active" data-days="7">7J</button>
                                <button class="btn btn-sm btn-outline chart-period" data-days="30">30J</button>
                                <button class="btn btn-sm btn-outline chart-period" data-days="90">90J</button>
                            </div>
                        </div>
                        <div class="chart-container"><canvas id="chart-production"></canvas></div>
                    </div>
                    <div class="card">
                        <div class="card-header">Répartition des poules</div>
                        <div class="chart-container"><canvas id="chart-repartition"></canvas></div>
                    </div>
                </div>

                <!-- Table + Activity -->
                <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;">
                    <div class="table-card">
                        <div class="card-header">
                            <span>Récapitulatif par lot</span>
                        </div>
                        <div style="overflow-x:auto;">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Lot</th>
                                        <th>Race</th>
                                        <th class="text-center">Semaine</th>
                                        <th class="text-end">Poules</th>
                                        <th class="text-end">Œufs jour</th>
                                        <th class="text-end">Stock œufs</th>
                                        <th class="text-end">Pertes jour</th>
                                        <th class="text-end">CA jour</th>
                                    </tr>
                                </thead>
                                <tbody id="dash-table-body">
                                    <tr><td colspan="8" class="text-center text-muted" style="padding:32px;">Chargement...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">Activité récente</div>
                        <div class="card-body" id="activity-feed" style="max-height:400px;overflow-y:auto;">
                            <div class="text-center text-muted" style="padding:24px;">Chargement...</div>
                        </div>
                    </div>
                </div>

            </main>
            <footer class="app-footer" id="partial-footer"></footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/pages/dashboard.js"></script>
</body>
</html>
